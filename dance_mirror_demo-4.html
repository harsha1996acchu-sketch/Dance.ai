<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dance Mirror — Proof of Concept</title>
<style>
  :root {
    --ink: #0d0f0c;
    --paper: #f2efe6;
    --line: #2f6f4f;
    --guide: #5ee2ff;
    --muted: #7a8577;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--ink);
    color: var(--paper);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    height: 100%;
    overflow: hidden;
  }
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    background: #000;
  }
  video, canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  video {
    transform: scaleX(-1);
  }
  #ui {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: env(safe-area-inset-top, 16px) 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    background: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent);
    z-index: 10;
    pointer-events: none;
  }
  #title {
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.85;
  }
  #status {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 12px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    max-width: 55vw;
    text-align: right;
    word-break: break-word;
  }
  #status.ready { color: #9be3a8; border-color: rgba(155,227,168,0.4); }
  #status.loading { color: #e3c99b; }
  #status.error { color: #e39b9b; }

  #bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 16px 16px env(safe-area-inset-bottom, 16px);
    background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #legend {
    display: flex;
    gap: 16px;
    font-size: 12px;
  }
  .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 6px;
  }
  .dot.you { background: var(--line); }
  .dot.guide { background: var(--guide); }

  #startBtn {
    -webkit-appearance: none;
    border: none;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
    font-weight: 600;
    padding: 14px;
    border-radius: 10px;
    letter-spacing: 0.01em;
  }
  #startBtn:active { opacity: 0.8; }

  #startScreen {
    position: absolute;
    inset: 0;
    background: var(--ink);
    z-index: 20;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 32px;
    text-align: center;
  }
  #startScreen h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  #startScreen p {
    font-size: 13px;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.5;
    margin: 0 0 28px;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="startScreen">
  <h1>Dance Mirror</h1>
  <p>Proof-of-concept test. Uses your camera and an offline pose model to mirror you and overlay a guide skeleton. Nothing leaves your phone.</p>
  <button id="startBtn">Start camera</button>
</div>

<div id="stage" class="hidden">
  <div id="ui">
    <div id="title">Dance Mirror — Test</div>
    <div id="status" class="loading">Loading model…</div>
  </div>

  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>

  <div id="bottom">
    <div id="legend">
      <span><span class="dot guide"></span>AI Guide (placeholder move)</span>
      <span><span class="dot you"></span>You</span>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
const startScreen = document.getElementById('startScreen');
const startBtn = document.getElementById('startBtn');
const stage = document.getElementById('stage');
const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

let detector = null;
let running = false;

// --- Placeholder "reference dance" ---
// A simple looping arm-raise / step sequence expressed as normalized
// joint offsets (0-1 of frame width/height), just to prove the overlay
// concept before real dance skeleton data is plugged in.
const GUIDE_JOINTS = ['nose','left_shoulder','right_shoulder','left_elbow','right_elbow',
  'left_wrist','right_wrist','left_hip','right_hip','left_knee','right_knee','left_ankle','right_ankle'];

function guidePoseAtTime(t) {
  // t in seconds, loop every 4s: arms raise up and down alternately, slight step
  const cycle = (t % 4) / 4; // 0..1
  const wave = Math.sin(cycle * Math.PI * 2);
  const cx = 0.5, hipY = 0.62, shY = 0.4;

  return {
    nose:           { x: cx,        y: 0.28 },
    left_shoulder:  { x: cx-0.09,   y: shY },
    right_shoulder: { x: cx+0.09,   y: shY },
    left_elbow:     { x: cx-0.15,   y: shY - 0.10*wave },
    right_elbow:    { x: cx+0.15,   y: shY + 0.10*wave },
    left_wrist:     { x: cx-0.18,   y: shY - 0.22*wave },
    right_wrist:    { x: cx+0.18,   y: shY + 0.22*wave },
    left_hip:       { x: cx-0.08,   y: hipY },
    right_hip:      { x: cx+0.08,   y: hipY },
    left_knee:      { x: cx-0.09,   y: hipY + 0.16 + 0.02*wave },
    right_knee:     { x: cx+0.09,   y: hipY + 0.16 - 0.02*wave },
    left_ankle:     { x: cx-0.10,   y: hipY + 0.32 },
    right_ankle:    { x: cx+0.10,   y: hipY + 0.32 },
  };
}

const SKELETON_PAIRS = [
  ['left_shoulder','right_shoulder'],
  ['left_shoulder','left_elbow'],['left_elbow','left_wrist'],
  ['right_shoulder','right_elbow'],['right_elbow','right_wrist'],
  ['left_shoulder','left_hip'],['right_shoulder','right_hip'],
  ['left_hip','right_hip'],
  ['left_hip','left_knee'],['left_knee','left_ankle'],
  ['right_hip','right_knee'],['right_knee','right_ankle'],
];

function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls;
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);

async function setupCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false
  });
  video.srcObject = stream;
  return new Promise((resolve, reject) => {
    video.onloadedmetadata = async () => {
      try {
        await video.play();
        resolve(video);
      } catch (e) {
        reject(e);
      }
    };
  });
}

async function loadModel() {
  await tf.setBackend('webgl');
  await tf.ready();
  detector = await poseDetection.createDetector(
    poseDetection.SupportedModels.MoveNet,
    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
  );
}

// Robotic / wireframe render for the AI guide — angular joints, precise
// thin lines, cyan palette. Deliberately reads as synthetic/computed,
// in contrast to the participant's own organic tracked body.
function drawGuideSkeleton(joints, w, h, t) {
  const px = (nx) => nx * w;
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';

  const CYAN = 'rgba(94, 226, 255, 0.9)';
  const CYAN_DIM = 'rgba(94, 226, 255, 0.35)';

  // thin precise limb lines
  SKELETON_PAIRS.forEach(([a, b]) => {
    const ja = joints[a], jb = joints[b];
    if (!ja || !jb) return;
    ctx.strokeStyle = CYAN;
    ctx.shadowColor = CYAN;
    ctx.shadowBlur = 6;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px(ja.x), ja.y * h);
    ctx.lineTo(px(jb.x), jb.y * h);
    ctx.stroke();
  });

  // angular joint markers (diamonds) instead of soft dots
  Object.entries(joints).forEach(([name, j]) => {
    const x = px(j.x), y = j.y * h;
    const s = name === 'nose' ? 9 : 5;
    ctx.fillStyle = CYAN;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(x, y - s);
    ctx.lineTo(x + s, y);
    ctx.lineTo(x, y + s);
    ctx.lineTo(x - s, y);
    ctx.closePath();
    ctx.fill();
  });

  // scanning pulse line sweeping down the figure — signals "computed"
  ctx.shadowBlur = 0;
  const sweepY = ((t * 0.25) % 1) * h;
  const grad = ctx.createLinearGradient(0, sweepY - 30, 0, sweepY + 30);
  grad.addColorStop(0, 'rgba(94,226,255,0)');
  grad.addColorStop(0.5, 'rgba(94,226,255,0.5)');
  grad.addColorStop(1, 'rgba(94,226,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, sweepY - 30, w, 60);

  ctx.restore();
}

// Sharper, clearer render for the participant's own tracked body —
// stays legible/technical since this is feedback, not the "spirit" guide
function drawUserSkeleton(joints, w, h) {
  const px = (nx) => (1 - nx) * w; // mirrored
  ctx.save();
  ctx.strokeStyle = 'rgba(47,111,79,0.85)';
  ctx.fillStyle = 'rgba(47,111,79,0.85)';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';

  SKELETON_PAIRS.forEach(([a, b]) => {
    const ja = joints[a], jb = joints[b];
    if (!ja || !jb) return;
    ctx.beginPath();
    ctx.moveTo(px(ja.x), ja.y * h);
    ctx.lineTo(px(jb.x), jb.y * h);
    ctx.stroke();
  });
  Object.values(joints).forEach(j => {
    ctx.beginPath();
    ctx.arc(px(j.x), j.y * h, 4, 0, 2 * Math.PI);
    ctx.fill();
  });
  ctx.restore();
}

function keypointsToNamed(keypoints) {
  const map = {};
  keypoints.forEach(kp => {
    if (kp.score > 0.35) {
      map[kp.name] = { x: kp.x / video.videoWidth, y: kp.y / video.videoHeight };
    }
  });
  return map;
}

async function renderLoop() {
  if (!running) return;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Guide skeleton (placeholder dance loop) — soft, glowing "presence" style
  const t = performance.now() / 1000;
  const guide = guidePoseAtTime(t);
  drawGuideSkeleton(guide, w, h, t);

  // Live detected pose — kept sharper/clearer since it's your own feedback
  try {
    const poses = await detector.estimatePoses(video, { flipHorizontal: false });
    if (poses[0]) {
      const named = keypointsToNamed(poses[0].keypoints);
      drawUserSkeleton(named, w, h);
    }
  } catch (e) {
    // skip frame on transient error
  }

  requestAnimationFrame(renderLoop);
}

startBtn.addEventListener('click', async () => {
  try {
    startScreen.classList.add('hidden');
    stage.classList.remove('hidden');
    resizeCanvas();

    setStatus('Starting camera…', 'loading');
    await setupCamera();

    setStatus('Loading model…', 'loading');
    await loadModel();

    setStatus('Live', 'ready');
    running = true;
    renderLoop();
  } catch (err) {
    const msg = (err && (err.message || err.name)) ? (err.name + ': ' + err.message) : String(err);
    setStatus(msg, 'error');
    console.error(err);
  }
});
</script>

</body>
</html>
